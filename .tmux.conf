# ~/.tmux.conf

##### Reload #####
unbind R
bind R source-file ~/.tmux.conf \; display-message 'Reloaded ~/.tmux.conf'

##### Windows #####
unbind r
unbind k
unbind '&'
bind r command-prompt "rename-window '%%'"
bind k kill-window

##### Splits #####
# Nota: aquí dejo tu mapeo original (h = split vertical, v = split horizontal)
unbind '"'
unbind %
bind h split-window -v
bind v split-window -h

##### Basics #####
set -g mouse on
set -s set-clipboard on
set -g status-position top
set -g status-justify left
# Modo vi para copiar
setw -g mode-keys vi

# Fallback seguro: siempre copia al buffer interno de tmux
bind -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-selection-and-cancel
bind -T copy-mode-vi Enter send-keys -X copy-selection-and-cancel
bind -T copy-mode-vi y send-keys -X copy-selection-and-cancel

# Si hay herramientas del sistema, también copia al portapapeles externo
if-shell 'command -v xsel >/dev/null 2>&1' "bind -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-pipe-and-cancel 'xsel -ib'; bind -T copy-mode-vi Enter send-keys -X copy-pipe-and-cancel 'xsel -ib'; bind -T copy-mode-vi y send-keys -X copy-pipe-and-cancel 'xsel -ib'"
if-shell 'command -v xclip >/dev/null 2>&1' "bind -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-pipe-and-cancel 'xclip -selection clipboard -in'; bind -T copy-mode-vi Enter send-keys -X copy-pipe-and-cancel 'xclip -selection clipboard -in'; bind -T copy-mode-vi y send-keys -X copy-pipe-and-cancel 'xclip -selection clipboard -in'"
if-shell 'command -v wl-copy >/dev/null 2>&1' "bind -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-pipe-and-cancel 'wl-copy'; bind -T copy-mode-vi Enter send-keys -X copy-pipe-and-cancel 'wl-copy'; bind -T copy-mode-vi y send-keys -X copy-pipe-and-cancel 'wl-copy'"
if-shell 'command -v termux-clipboard-set >/dev/null 2>&1' "bind -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-pipe-and-cancel 'termux-clipboard-set'; bind -T copy-mode-vi Enter send-keys -X copy-pipe-and-cancel 'termux-clipboard-set'; bind -T copy-mode-vi y send-keys -X copy-pipe-and-cancel 'termux-clipboard-set'"
# Evita que tmux renombre ventanas automáticamente (esto evita localhost/bash si tú ya renombraste)
set -g allow-rename off
set -g automatic-rename off

##### Plugins (TPM) #####
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'catppuccin/tmux#v2.1.3'
set -g @plugin 'tmux-plugins/tmux-resurrect'

##### Catppuccin #####
set -g @catppuccin_flavor "mocha"
set -g @catppuccin_window_status_style "rounded"

# Window list text (ESTO es lo que quieres)
# Inactivas:
set -g @catppuccin_window_text "#W"
# Activa:
set -g @catppuccin_window_current_text "#W"

##### Status line #####
# Reset defensivo para evitar duplicados al recargar
set -g status-left  ""
set -g status-right ""

set -g status-left-length 20
set -g status-right-length 100

# Derecha: session + application (en ese orden)
set -g status-right "#{E:@catppuccin_status_session}#{E:@catppuccin_status_application}"

##### TPM init (SIEMPRE al final) #####
run '~/.tmux/plugins/tpm/tpm'
set-option -g default-shell /bin/bash
# Fuerza bash como shell interactivo (no login) para que .bashrc se ejecute
# y starship/aliases estén disponibles en cada pane/window
set-option -g default-command "bash"
