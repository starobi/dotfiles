# ~/.tmux.conf

##### Reload #####
unbind R
bind R source-file ~/.tmux.conf \; display-message 'Reloaded ~/.tmux.conf'

##### Windows #####
unbind r
unbind k
unbind '&'
bind r command-prompt "rename-window '%%'"
bind k kill-window

##### Splits #####
# Nota: aquí dejo tu mapeo original (h = split vertical, v = split horizontal)
unbind '"'
unbind %
bind h split-window -v
bind v split-window -h

##### Basics #####
set -g mouse on
set -g status-position top
set -g status-justify left

# Evita que tmux renombre ventanas automáticamente (esto evita localhost/bash si tú ya renombraste)
set -g allow-rename off
set -g automatic-rename off

##### Plugins (TPM) #####
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'catppuccin/tmux#v2.1.3'
set -g @plugin 'tmux-plugins/tmux-resurrect'

##### Catppuccin #####
set -g @catppuccin_flavor "mocha"
set -g @catppuccin_window_status_style "rounded"

# Window list text (ESTO es lo que quieres)
# Inactivas:
set -g @catppuccin_window_text "#W"
# Activa:
set -g @catppuccin_window_current_text "#W"

##### Status line #####
# Reset defensivo para evitar duplicados al recargar
set -g status-left  ""
set -g status-right ""

set -g status-left-length 20
set -g status-right-length 100

# Derecha: session + application (en ese orden)
set -g status-right "#{E:@catppuccin_status_session}#{E:@catppuccin_status_application}"

##### TPM init (SIEMPRE al final) #####
run '~/.tmux/plugins/tpm/tpm'
